const STYLES = `

// Botanical SVG — abstract distilled drop / molecule suggestion
const BotanicalMark = () => (
  <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" style={{opacity:.35}}>
    <circle cx="19" cy="19" r="18" stroke="rgba(154,123,79,.5)" strokeWidth=".8"/>
    <circle cx="19" cy="19" r="10" stroke="rgba(154,123,79,.35)" strokeWidth=".6" strokeDasharray="2 2.5"/>
    <circle cx="19" cy="19" r="2.5" fill="rgba(154,123,79,.5)"/>
    <line x1="19" y1="1" x2="19" y2="9" stroke="rgba(154,123,79,.4)" strokeWidth=".7"/>
    <line x1="19" y1="29" x2="19" y2="37" stroke="rgba(154,123,79,.4)" strokeWidth=".7"/>
    <line x1="1" y1="19" x2="9" y2="19" stroke="rgba(154,123,79,.4)" strokeWidth=".7"/>
    <line x1="29" y1="19" x2="37" y2="19" stroke="rgba(154,123,79,.4)" strokeWidth=".7"/>
  </svg>
);

const safeArray = v => Array.isArray(v) ? v : [];
const isValidNumber = v => v !== null && v !== undefined;

function FragranceExplorer(){
  const [lang, setLang] = useState("es");
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const debounceRef = useRef(null);
  const t = T[lang];

  const toggleLang = () => { setLang(l => l==="es"?"en":"es"); setResult(null); setError(null); setQuery(""); };

  const buildPrompt = (term, currentLang) => {
    const isEs = currentLang === "es";
    const pyramidVals = isEs ? '"Salida","Corazón","Fondo"' : '"Top","Heart","Base"';
    return `You are an expert perfumer. Provide complete technical and sensory information about the perfumery ingredient: "${term}".

Respond ONLY with a valid JSON object. No extra text, no backticks, no markdown. Use exactly this structure:
{"name":"official name","latin_name":"botanical or null","olfactory_family":"main family","cas_number":"CAS or null","odor_description":"poetic sensory description 2-3 sentences","odor_keywords":["w1","w2","w3","w4"],"pyramid_position":["value1"],"density_gcm3":"density or null","usage_min_pct":0.5,"usage_max_pct":5.0,"origin":"geographic origin","extraction_method":"method","perfumery_uses":"uses 2-3 sentences","longevity":"larga","ifra_restricted":false,"notable_examples":["Perfume 1","Perfume 2"],"blends_well_with":["ingredient1","ingredient2","ingredient3"]}

RULES: longevity must be one of "corta","media","larga","muy larga". pyramid_position values from: ${pyramidVals}. usage_min_pct and usage_max_pct must be JSON numbers. ifra_restricted must be boolean. ALL text in ${isEs?"SPANISH":"ENGLISH"}.`;
  };

  const search = async (term) => {
    const searchTerm = (term || query).trim();
    if (!searchTerm) return;
    const currentLang = lang;
    const currentT = T[currentLang];
    setLoading(true); setResult(null); setError(null);
    try {
      const response = await fetch("/.netlify/functions/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ term: searchTerm, lang: currentLang })
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || "API error");
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("").trim();
      if (!text) throw new Error("Empty response");
      const clean = text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();
      const parsed = JSON.parse(clean);
      if (!parsed || !parsed.name) throw new Error("Invalid data");
      setResult(parsed);
    } catch(e) {
      console.error(e);
      if (e instanceof SyntaxError) setError(currentT.errorParse);
      else if (e.message?.startsWith("HTTP")) setError(currentT.errorHttp);
      else setError(currentT.errorGeneral);
    } finally { setLoading(false); }
  };

  const handleKey = (e) => { if (e.key === "Enter") search(); };
  const handleSuggestion = (s) => { setQuery(s); search(s); };

  const longevityKey = result?.longevity?.toLowerCase().trim() || "";
  const longevityLabel = t.longevityValues[longevityKey] || longevityKey;
  const longevityPct = { corta: 25, media: 50, larga: 75, "muy larga": 100 }[longevityKey] || 50;
  const pyramidPositions = safeArray(result?.pyramid_position);
  const minPct = isValidNumber(result?.usage_min_pct) ? result.usage_min_pct : null;
  const maxPct = isValidNumber(result?.usage_max_pct) ? result.usage_max_pct : null;
  const hasUsage = minPct !== null && maxPct !== null;
  const barWidth = hasUsage ? Math.min(Math.max(maxPct * 5, 5), 100) : 50;

  return (
    <div className="ex-wrap">
      <style>{STYLES}</style>

      <div className="ex-topbar">
        <button className="ex-lang" onClick={toggleLang}>{t.langBtn}</button>
      </div>

      <div className="ex-head">
        <p className="ex-eyebrow">{t.eyebrow}</p>
        <h2 className="ex-title">{t.title.split('\n').map((line, i) =>
          i === 0 ? <span key={i}>{line}<br/></span> : <em key={i}>{line}</em>
        )}</h2>
      </div>

      <div className="ex-botanical">
        <div className="ex-botanical-line"/>
        <BotanicalMark/>
        <div className="ex-botanical-line"/>
      </div>

      <div className="ex-search">
        <div className="ex-input-wrap">
          <input
            className="ex-input"
            placeholder={t.placeholder}
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={handleKey}
          />
          <button className="ex-search-icon" onClick={() => search()} disabled={loading || !query.trim()}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round">
              <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
          </button>
        </div>
        <div className="ex-suggest">
          {t.suggestions.map((s, i) => (
            <React.Fragment key={s}>
              <button className="ex-suggest-item" disabled={loading} onClick={() => handleSuggestion(s)}>{s}</button>
              {i < t.suggestions.length - 1 && <span className="ex-suggest-sep">·</span>}
            </React.Fragment>
          ))}
        </div>
      </div>

      {loading && (
        <div className="ex-loading">
          <p className="ex-loading-text">{t.searching}</p>
        </div>
      )}
      {error && !loading && <p className="ex-error">{error}</p>}

      {result && !loading && (
        <div className="ex-result">

          <div className="ex-result-head">
            <h3 className="ex-result-name">{result.name}</h3>
            {result.latin_name && result.latin_name !== "null" &&
              <p className="ex-result-latin">{result.latin_name}</p>}
            {result.olfactory_family &&
              <span className="ex-result-family">{result.olfactory_family}</span>}
          </div>

          {result.odor_description && (
            <div className="ex-odor-section">
              <p className="ex-odor-text">"{result.odor_description}"</p>
              {safeArray(result.odor_keywords).length > 0 && (
                <div className="ex-keywords">
                  {result.odor_keywords.map((k, i) => <span key={i} className="ex-kw">{k}</span>)}
                </div>
              )}
            </div>
          )}

          <div className="ex-data">
            <div className="ex-datum">
              <p className="ex-datum-label">{t.pyramid}</p>
              <div className="ex-pyramid">
                {t.pyramidPositions.map((pos, i) => {
                  const raw = lang === "es" ? ["Salida","Corazón","Fondo"] : ["Top","Heart","Base"];
                  return (
                    <div key={pos} style={{display:'flex',alignItems:'center',gap:'.3rem',marginRight:'.8rem'}}>
                      <div className={`ex-pyr-dot${pyramidPositions.includes(raw[i]) ? " on" : ""}`}/>
                      <span style={{fontSize:'.68rem',color:'rgba(44,36,24,.5)',letterSpacing:'.04em'}}>{pos}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="ex-datum">
              <p className="ex-datum-label">{t.longevity}</p>
              <p className="ex-datum-value" style={{textTransform:'capitalize'}}>{longevityLabel}</p>
              <div className="ex-bar"><div className="ex-bar-fill" style={{width:`${longevityPct}%`}}/></div>
            </div>

            <div className="ex-datum">
              <p className="ex-datum-label">{t.concentration}</p>
              {hasUsage ? (
                <div>
                  <p className="ex-datum-value">{minPct}% — {maxPct}%</p>
                  <div className="ex-bar"><div className="ex-bar-fill" style={{width:`${barWidth}%`}}/></div>
                </div>
              ) : <p className="ex-datum-value">—</p>}
            </div>

            {result.origin && (
              <div className="ex-datum">
                <p className="ex-datum-label">{t.origin}</p>
                <p className="ex-datum-value">{result.origin}</p>
              </div>
            )}
            {result.extraction_method && (
              <div className="ex-datum">
                <p className="ex-datum-label">{t.extraction}</p>
                <p className="ex-datum-value">{result.extraction_method}</p>
              </div>
            )}
            {result.cas_number && result.cas_number !== "null" && (
              <div className="ex-datum">
                <p className="ex-datum-label">CAS</p>
                <p className="ex-datum-value mono">{result.cas_number}</p>
              </div>
            )}
          </div>

          {result.perfumery_uses && (
            <div className="ex-prose-section">
              <p className="ex-prose-label">{t.uses}</p>
              <p className="ex-prose-text">{result.perfumery_uses}</p>
            </div>
          )}

          {safeArray(result.blends_well_with).length > 0 && (
            <div className="ex-tags-section">
              <p className="ex-prose-label">{t.blendsWith}</p>
              <div className="ex-inline-tags">
                {result.blends_well_with.map((b, i) => <span key={i} className="ex-inline-tag">{b}</span>)}
              </div>
            </div>
          )}

          {safeArray(result.notable_examples).length > 0 && (
            <div className="ex-tags-section">
              <p className="ex-prose-label">{t.presentIn}</p>
              <div className="ex-inline-tags">
                {result.notable_examples.map((ex, i) => <span key={i} className="ex-inline-tag">{ex}</span>)}
              </div>
            </div>
          )}

          <div className="ex-footer-meta">
            {result.density_gcm3 && result.density_gcm3 !== "null" &&
              <span className="ex-meta-item">Densidad <span>{result.density_gcm3} g/cm³</span></span>}
            <span className="ex-meta-item">IFRA <span>{result.ifra_restricted ? t.ifraYes : t.ifraNo}</span></span>
          </div>

        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('explorer-root'));
root.render(<FragranceExplorer />);
</script>

<script>
const burger=document.getElementById('burger');
const overlay=document.getElementById('nav-overlay');
function closeMenu(){burger.classList.remove('open');overlay.style.display='none';overlay.classList.remove('open');document.body.style.overflow='';}
burger.addEventListener('click',()=>{
  const open=burger.classList.toggle('open');
  if(open){overlay.style.display='flex';requestAnimationFrame(()=>overlay.classList.add('open'));document.body.style.overflow='hidden';}
  else closeMenu();
});
</script>
</body>
</html>
